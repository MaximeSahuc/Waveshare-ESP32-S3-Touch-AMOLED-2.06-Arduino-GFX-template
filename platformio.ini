; PlatformIO config for Waveshare ESP32-S3-Touch-AMOLED-2.06 watch
; MCU: ESP32-S3R8 (Xtensa LX7) | 8 MB OCTAL PSRAM (OPI) | 32 MB flash
; Display: 2.06" AMOLED 410x502, CO5300 driver over QSPI, native USB-CDC (HWCDC)

[env:waveshare_s3_amoled_206]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

; Base on the generic S3 DevKitC-1 board, then override flash/PSRAM/partitions
; below for the real hardware (there is no stock board def for this watch).
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash & PSRAM -----------------------------------------------------------
; qio_opi = QIO flash + OCTAL (OPI) PSRAM. This is the required mode for the
; ESP32-S3R8's 8 MB octal PSRAM; the wrong memory_type yields a board that
; boots without PSRAM (or not at all).
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
; 32 MB flash (DevKitC-1 default is 8 MB) -> override size and partition map.
board_upload.flash_size = 32MB
board_upload.maximum_size = 33554432
board_build.partitions = partitions_32MB.csv

; --- USB / Serial ------------------------------------------------------------
; Serial on this board is native USB-CDC (HWCDC), not a UART bridge.
;   ARDUINO_USB_MODE=1        -> use the built-in USB peripheral (device mode)
;   ARDUINO_USB_CDC_ON_BOOT=1 -> bring up USB-CDC at boot so the port enumerates
;                                (matches the Arduino IDE "USB CDC On Boot: Enabled"
;                                 setting under which the demo was verified)
;   BOARD_HAS_PSRAM           -> let the core init and expose the 8 MB PSRAM
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -Iinclude
  -DLV_CONF_INCLUDE_SIMPLE
  ; -DLV_LVGL_H_INCLUDE_SIMPLE ; .c font files do #include "lvgl.h"
  ; -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/Network/src
  ; -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/NetworkClientSecure/src

; --- Libraries ---------------------------------------------------------------
; lib_deps =

lib_ldf_mode = deep+

; --- Monitor -----------------------------------------------------------------
monitor_speed = 115200
